---
deployment:
  tasks:
    - export DEPLOYPATH=/home/hcispanel/kpn-ga-portal

    # Ensure deployment folder exists
    - mkdir -p $DEPLOYPATH
    - mkdir -p $DEPLOYPATH/public
    - mkdir -p $DEPLOYPATH/storage
    - mkdir -p $DEPLOYPATH/bootstrap/cache

    # Copy all project files except .git
    - cp -r app bootstrap config database routes resources artisan composer.json composer.lock package.json package-lock.json $DEPLOYPATH

    # Change to deployment directory
    - cd $DEPLOYPATH

    # Set correct permissions
    - chmod -R 755 storage
    - chmod -R 755 bootstrap/cache

    # Clear and optimize Laravel
    - php artisan optimize:clear
    - php artisan config:cache
    - php artisan view:cache

    # Copy public assets to the public_html directory
    - \cp -rf public/build /home/hcispanel/public_html/kpn-ga-portal
